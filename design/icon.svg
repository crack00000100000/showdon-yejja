<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <title>showdon-yejja</title>
  <desc>쇼돈 예짜 (예능 짜집기) 앱 아이콘 — 큐레이션 별 + 짜집기 가위</desc>

  <!-- 배경: 따뜻한 오렌지 (예능 vibe) -->
  <rect width="1024" height="1024" rx="232" fill="#FB923C"/>

  <!-- 우하단 다크 브라운 사선 (입체감) -->
  <path d="M 1024 0 L 1024 1024 L 280 1024 Z" fill="#9A3412" opacity="0.85"/>

  <!-- 보케 광원 (family 패턴) -->
  <circle cx="220" cy="200" r="130" fill="#FFFFFF" opacity="0.14"/>
  <circle cx="900" cy="170" r="55" fill="#FFFFFF" opacity="0.10"/>
  <circle cx="540" cy="150" r="35" fill="#FFFFFF" opacity="0.18"/>

  <!-- 메인: 흰색 큐레이션 별 (5각, 중앙) -->
  <polygon points="512,192 594,399 816,413 645,555 700,771 512,652 324,771 379,555 208,413 430,399"
           fill="#FFFFFF"
           stroke="#FFFFFF"
           stroke-width="20"
           stroke-linejoin="round"/>

  <!-- 골드 스파클 (큐레이션 액센트) -->
  <polygon points="180,290 196,328 180,366 164,328" fill="#FBBF24"/>
  <circle cx="828" cy="280" r="14" fill="#FBBF24"/>
  <circle cx="180" cy="660" r="10" fill="#FBBF24"/>

  <!-- 우하단 배지: 가위 (편집·짜집기 상징) -->
  <circle cx="870" cy="870" r="110" fill="#1F2937"/>
  <!-- 가위 손잡이 -->
  <circle cx="838" cy="855" r="22" fill="none" stroke="#FFFFFF" stroke-width="14"/>
  <circle cx="902" cy="855" r="22" fill="none" stroke="#FFFFFF" stroke-width="14"/>
  <!-- 가위 칼날 (X) -->
  <line x1="852" y1="868" x2="900" y2="918" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round"/>
  <line x1="888" y1="868" x2="840" y2="918" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round"/>
</svg>
